version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: robotics_course_graph
    ports:
      - "7474:7474"   # HTTP web interface
      - "7687:7687"   # Bolt protocol (för appar/Python)
    environment:
      - NEO4J_AUTH=neo4j/robotics2026   # Username: neo4j, Password: robotics2026
      # Deaktiverar vissa varningar för lokal utveckling
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
